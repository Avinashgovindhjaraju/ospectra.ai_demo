<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Ospectra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a0a2e;
  --deep: #0d0d3b;
  --violet: #7c3aed;
  --accent: #a855f7;
  --pink: #c026d3;
  --white: #ffffff;
  --soft: #e2e8f0;
  --muted: #94a3b8;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --error: #f87171;
  --success: #4ade80;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

/* Stars BG */
.stars-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(192,38,211,0.1) 0%, transparent 50%),
    var(--navy);
}
.stars-bg::before {
  content:''; position:absolute; inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 90%, rgba(255,255,255,0.3) 0%, transparent 100%);
}

/* Page Layout */
.page-wrap {
  position: relative; z-index: 1;
  width: 100%; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
}

/* Logo */
.logo-link {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; margin-bottom: 40px;
  animation: fadeInDown 0.6s ease both;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--violet), var(--pink));
  border-radius: 50% 50% 50% 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 900; color:#fff;
  font-family:'Syne',sans-serif;
}
.logo-text { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:#fff; }
.logo-text span { color: var(--accent); }

/* Auth Card */
.auth-card {
  width: 100%; max-width: 440px;
  background: rgba(13,13,59,0.8);
  border: 1px solid rgba(124,58,237,0.25);
  border-radius: 28px;
  padding: 48px 44px;
  backdrop-filter: blur(20px);
  box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(168,85,247,0.08);
  animation: fadeInUp 0.7s 0.1s ease both;
  position: relative;
  overflow: hidden;
}
.auth-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--violet), var(--pink), transparent);
}

.card-header { text-align: center; margin-bottom: 36px; }
.card-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
  padding: 5px 14px; border-radius: 100px;
  font-size: 0.75rem; font-weight: 600; color: var(--accent);
  margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.1em;
}
.card-header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.9rem; font-weight: 800;
  margin-bottom: 8px;
}
.card-header p { color: var(--muted); font-size: 0.92rem; line-height: 1.5; }

/* Form */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 0.78rem; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 8px;
}
.input-wrap { position: relative; }
.input-wrap .input-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; pointer-events: none; opacity: 0.5;
}
.form-group input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 16px 13px 42px;
  color: #fff; font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .25s, box-shadow .25s, background .25s;
}
.form-group input:focus {
  border-color: var(--violet);
  background: rgba(124,58,237,0.06);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
}
.form-group input.error { border-color: var(--error); }
.form-group input.success { border-color: var(--success); }

/* Password toggle */
.toggle-pass {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 0.85rem; padding: 4px; transition: color .2s;
}
.toggle-pass:hover { color: #fff; }

/* Field error */
.field-error {
  font-size: 0.78rem; color: var(--error); margin-top: 6px;
  display: none; align-items: center; gap: 4px;
}
.field-error.show { display: flex; }

/* Forgot */
.forgot-row {
  display: flex; justify-content: flex-end; margin-top: -10px; margin-bottom: 20px;
}
.forgot-link {
  font-size: 0.82rem; color: var(--accent); text-decoration: none;
  transition: color .2s;
}
.forgot-link:hover { color: #c084fc; }

/* Submit btn */
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--violet), var(--pink));
  color: #fff; border: none; padding: 14px;
  border-radius: 12px; font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: transform .2s, box-shadow .2s, opacity .2s;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.45); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-submit .spinner {
  width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite; display: none;
}
.btn-submit.loading .btn-text { display: none; }
.btn-submit.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Alert banner */
.alert {
  border-radius: 10px; padding: 12px 16px;
  font-size: 0.87rem; margin-bottom: 20px;
  display: none; align-items: center; gap: 10px;
  animation: fadeInDown .3s ease;
}
.alert.show { display: flex; }
.alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
.alert.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #86efac; }

/* Divider */
.divider {
  display: flex; align-items: center; gap: 12px; margin: 24px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.divider span { color: var(--muted); font-size: 0.8rem; }

/* Switch link */
.switch-link {
  text-align: center; margin-top: 24px;
  font-size: 0.88rem; color: var(--muted);
}
.switch-link a { color: var(--accent); text-decoration: none; font-weight: 600; transition: color .2s; }
.switch-link a:hover { color: #c084fc; }

/* Animations */
@keyframes fadeInDown { from{opacity:0;transform:translateY(-16px);} to{opacity:1;transform:none;} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:none;} }

/* Responsive */
@media (max-width: 480px) {
  .auth-card { padding: 36px 24px; border-radius: 20px; }
}
</style>
</head>
<body>

<div class="stars-bg"></div>

<div class="page-wrap">
  <a href="index.html" class="logo-link">
    <div class="logo-icon">O</div>
    <span class="logo-text">O<span>spectra</span></span>
  </a>

  <div class="auth-card">
    <div class="card-header">
      <div class="card-badge">Welcome back</div>
      <h1>Sign in to Ospectra</h1>
      <p>Access your agentic AI platform and workflows</p>
    </div>

    <!-- Alert Banner -->
    <div class="alert" id="alert" role="alert"></div>

    <div class="form-group">
      <label>Work Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="field-error" id="email-error">⚠ Please enter a valid email</div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <button class="toggle-pass" type="button" onclick="togglePass('password', this)">Show</button>
      </div>
      <div class="field-error" id="password-error">⚠ Password is required</div>
    </div>

    <div class="forgot-row">
      <a href="#" class="forgot-link" onclick="showForgot()">Forgot password?</a>
    </div>

    <button class="btn-submit" id="login-btn" onclick="handleLogin()">
      <span class="btn-text">Sign In →</span>
      <div class="spinner"></div>
    </button>

    <div class="divider"><span>New to Ospectra?</span></div>

    <div class="switch-link">
      Don't have an account? <a href="signup.html">Create one free →</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('ospectra_user')) {
    window.location.href = 'index.html';
  }

  function togglePass(inputId, btn) {
    const inp = document.getElementById(inputId);
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    btn.textContent = isPass ? 'Hide' : 'Show';
  }

  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.textContent = (type === 'error' ? '⚠ ' : '✓ ') + msg;
    el.className = `alert ${type} show`;
  }
  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  async function handleLogin() {
    hideAlert();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    // Client-side validation
    let valid = true;
    const emailErr = document.getElementById('email-error');
    const passErr = document.getElementById('password-error');

    document.getElementById('email').classList.remove('error');
    document.getElementById('password').classList.remove('error');
    emailErr.classList.remove('show');
    passErr.classList.remove('show');

    if (!email || !validateEmail(email)) {
      document.getElementById('email').classList.add('error');
      emailErr.classList.add('show');
      valid = false;
    }
    if (!password) {
      document.getElementById('password').classList.add('error');
      passErr.classList.add('show');
      valid = false;
    }
    if (!valid) return;

    // Submit
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: email, password })
      });
      const data = await res.json();

      if (data.success) {
        // ── ORIGINAL LINE (unchanged) ──────────────────────────────────────────
        // Kept exactly as you had it — stores username + age
        localStorage.setItem('ospectra_user', JSON.stringify({ username: email, age: data.age }));

        // ── ADDED: fire ospTrack with real name + email ────────────────────────
        // Derives a clean display name from the email prefix:
        // "avinash.govindharaju@ospectra.ai" → "Avinash Govindharaju"
        if (window.ospTrack) {
          const displayName = email
            .split('@')[0]
            .replace(/[._-]+/g, ' ')
            .replace(/\b\w/g, function(c) { return c.toUpperCase(); });

          window.ospTrack('user_login', {
            element:      'Login Form',
            email:        email,
            visitor_name: displayName,
          });
        }
        // ── END ADDED ──────────────────────────────────────────────────────────

        showAlert('Login successful! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } else {
        showAlert(data.message || 'Login failed. Please try again.');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    } catch (err) {
      showAlert('Network error. Please check your connection.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showForgot() {
    showAlert('Password reset — contact info@ospectra.ai');
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
